# docker-compose.yml
services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: viali-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend-node
    networks:
      - viali-network

  backend-node:
    build:
      context: ./backend-node
      dockerfile: Dockerfile
    container_name: viali-node
    ports:
      - "3000:3000"
    volumes:
      - ./backend-node:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      - backend-python
    networks:
      - viali-network
    restart: unless-stopped

  backend-python:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
    container_name: viali-python
    ports:
      - "8001:8001"
    volumes:
      - ./backend-python:/app
      - ./docs:/app/docs
    env_file:
      - .env
    networks:
      - viali-network
    restart: unless-stopped

networks:
  viali-network:
    driver: bridge
